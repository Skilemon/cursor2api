# Cursor2API v2 配置文件

# 服务端口
port: 3010

# 请求超时（秒）
timeout: 120

# 代理设置（三选一）
# ⚠️ Node.js fetch 不读取 HTTP_PROXY / HTTPS_PROXY 环境变量，
#    必须在此处或通过 PROXY 环境变量显式配置代理。

# 方式1：静态代理（固定IP）
# proxy: "http://127.0.0.1:7890"

# 方式4：内置 mihomo 节点（推荐，Docker 部署时使用）
# mihomo 可执行文件路径（Docker 镜像内已内置，留空自动搜索 PATH）
# mihomo: "/usr/local/bin/mihomo"
#
# 方式4a：订阅链接（自动拉取节点，支持 base64 编码的 vless/hysteria2/ss 列表）
# subscription: "https://your-subscription-url"
#
# 方式4b：直接填写节点列表
# nodes:
#   - "vless://..."
#   - "hysteria2://..."

# 方式2：代理池（动态IP，推荐多实例部署）
# 每个实例启动时从该接口获取一个代理IP，请求失败时自动换新IP
# proxy_pool_url: "http://localhost:5173/api/getSingleProxy?delay=500"

# API 鉴权 Token（可选）
# 设置后，调用 /v1/messages 等接口及访问 /logs 日志页需携带 token
# 传入方式：Authorization: Bearer <token> 或 x-api-key: <token> 或 ?token=<token>
# 单个 token
# auth_token: "your_token_here"
# 多个 token（任意一个均可通过验证）
# auth_tokens:
#   - "token1"
#   - "token2"

# Worker 进程数（多进程模式）
# 默认使用 CPU 核心数，环境变量 WORKERS 优先级更高
workers: 10

# Cursor 使用的模型
cursor_model: "anthropic/claude-sonnet-4.6"

# 浏览器指纹配置
fingerprint:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/140.0.0.0 Safari/537.36"

# 视觉处理降级配置（可选）
# 如果开启，可以拦截您发给大模型的图片进行降级处理（因为目前免费 Cursor 不支持视觉）。
vision:
  enabled: true
  # mode 选项: 'ocr' 或 'api'
  # 'ocr': [默认模式] 彻底免 Key，零配置，完全依赖本机的 CPU 识图，提取文本、报错日志、代码段后发给大模型。
  # 'api': 需要配置下方的 baseUrl 和 apiKey，把图发给外部视觉模型（如 Gemini、OpenRouter），能“看到”画面内容和色彩。
  mode: 'ocr'
  
  # ---------- 以下选项仅在 mode: 'api' 时才生效 ----------
  # base_url: "https://openrouter.ai/api/v1/chat/completions"
  # api_key: "sk-or-v1-..."
  # model: "meta-llama/llama-3.2-11b-vision-instruct:free"
  # proxy: "http://127.0.0.1:7890"  # 视觉 API 单独走代理（留空则跟随全局代理）

# 历史消息压缩配置（可选）
# 当对话历史过长时，自动压缩早期消息以节省 token
# compression:
#   enabled: true          # 是否启用压缩，默认 false
#   level: 2               # 压缩力度：1=轻度(仅截断) 2=中度(摘要) 3=重度(极度压缩)，默认 2
#   keep_recent: 6         # 保留最近 N 条消息不压缩，默认 6
#   early_msg_max_chars: 2000  # 早期消息最多保留字符数，默认 2000
